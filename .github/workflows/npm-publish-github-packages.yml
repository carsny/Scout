        height: ${BOTTOM_H}px;
        background: ${C.bg};
        border-top: 1px solid ${C.accentDim};
        display: none;
        align-items: stretch;
        pointer-events: all;
        padding: 8px 12px;
        gap: 12px;
        z-index: 2147483641;
      }
      #scout-hud.scout-hud--open #scout-bottom {
        display: flex;
      }
      #scout-bottom-left {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }

      /* ── Panel headers ── */
      .panel-header {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.07em;
        color: ${C.accent};
        text-transform: uppercase;
        padding-bottom: 4px;
        border-bottom: 1px solid ${C.accentDim};
        flex-shrink: 0;
      }

      /* ── Cards ── */
      .scout-card {
        background: ${C.cardBg};
        border: 1px solid #21262d;
        border-radius: 6px;
        padding: 5px 8px;
        flex-shrink: 0;
      }
      .scout-card--warning {
        border-color: ${C.warning};
        background: rgba(240,165,0,0.07);
      }
      .card-label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.07em;
        color: ${C.textDim};
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .card-value { font-size: 12px; color: ${C.text}; }
      .card-sub   { font-size: 11px; color: ${C.textDim}; margin-top: 2px; }

      /* ── Trail map ── */
      .trail-section-label {
        font-size: 10px;
        font-weight: 600;
        color: ${C.textDim};
        margin-bottom: 2px;
      }
      .trail-item { font-size: 11px; padding: 1px 0; display: flex; align-items: center; gap: 4px; }
      .trail-item--done { color: ${C.success}; }
      .trail-item--todo { color: ${C.textDim}; }

      /* ── Nudge cards ── */
      #nudge-list { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
      .nudge-card {
        background: ${C.nudgeBg};
        border: 1px solid #2d3748;
        border-radius: 6px;
        padding: 7px 9px;
      }
      .nudge-text { font-size: 12px; color: ${C.text}; line-height: 1.4; }
      .nudge-reactions { display: flex; gap: 6px; margin-top: 5px; }
      .nudge-btn {
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: ${C.text};
        font-size: 11px;
        padding: 2px 8px;
        cursor: pointer;
      }
      .nudge-btn:hover { background: #30363d; }
      .nudge-card--outside {
        border-color: ${C.accent};
        background: rgba(57,208,200,0.05);
      }

      /* ── Bottom bar content ── */
      .bottom-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.07em;
        color: ${C.accent};
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .scout-collapse-btn {
        background: ${C.accentDim};
        border: 1px solid ${C.accent};
        border-radius: 4px;
        color: ${C.text};
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        padding: 2px 8px;
        line-height: 1.4;
        transition: background 0.15s, color 0.15s;
        flex-shrink: 0;
        letter-spacing: 0.05em;
      }
      .scout-collapse-btn:hover { background: ${C.accent}; color: #000; }
      #scout-bottom {
        transition: height 0.2s ease;
        overflow: hidden;
      }
      #scout-corr-cols { display: flex; gap: 12px; flex: 1; min-height: 0; }
      .corr-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
      .corr-col-title { font-size: 10px; font-weight: 600; color: ${C.success}; }
      .corr-col-body {
        font-size: 11px;
        color: ${C.text};
        overflow-y: auto;
        max-height: 80px;
        scrollbar-width: thin;
        scrollbar-color: ${C.accentDim} transparent;
      }
      #scout-corr-btns { display: flex; gap: 8px; }
      .scout-copy-btn {
        background: #21262d;
        border: 1px solid ${C.accentDim};
        border-radius: 4px;
        color: ${C.accent};
        font-size: 11px;
        font-weight: 600;
        padding: 3px 12px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .scout-copy-btn:hover { background: ${C.accentDim}; color: #fff; }

      /* ── Utility ── */
      .dim { color: ${C.textDim}; font-style: italic; }
      .sev-badge {
        display: inline-block;
        background: #1a3a6b;
        color: #79b8ff;
        border: 1px solid #1f6feb;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 700;
        padding: 1px 5px;
        vertical-align: middle;
      }
      .ticket-type {
        font-size: 11px;
        color: ${C.text};
        font-weight: 600;
      }
      .status-text {
        font-size: 10px;
        color: ${C.success};
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .history-line {
        font-size: 11px;
        color: ${C.warning};
        line-height: 1.6;
      }
      .assignee-text {
        font-size: 10px;
        color: ${C.textDim};
      }
      .wdid-text {
        font-size: 10px;
        color: ${C.accent};
        font-weight: 600;
        letter-spacing: 0.03em;
      }
      .scout-link {
        display: block;
        font-size: 11px;
        color: ${C.accent};
        text-decoration: none;
        padding: 1px 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .scout-link:hover { text-decoration: underline; }
      /* ── Eva button ── */
      .scout-eva-btn {
        background: #1a3a6b;
        border: 1px solid #1f6feb;
        border-radius: 4px;
        color: #79b8ff;
        font-size: 10px;
        font-weight: 600;
        padding: 3px 8px;
        cursor: pointer;
        width: 100%;
        text-align: left;
        transition: background 0.15s;
      }
      .scout-eva-btn:hover { background: #1f4a8b; }
      /* ── Toast ── */
      #scout-toast {
        position: fixed;
        bottom: 140px;
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        background: #1f6feb;
        color: #fff;
        font-size: 12px;
        font-weight: 600;
        padding: 8px 16px;
        border-radius: 6px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s, transform 0.2s;
        z-index: 2147483647;
        white-space: nowrap;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #scout-toast.scout-toast--visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      /* ── Session steps ── */
      #val-session-steps {
        max-height: 120px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: ${C.accentDim} transparent;
      }
      .step-item {
        display: flex;
        gap: 5px;
        align-items: baseline;
        padding: 1px 0;
        font-size: 11px;
        line-height: 1.4;
      }
      .step-time {
        color: ${C.textDim};
        font-size: 10px;
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
      }
      .step-text {
        color: ${C.text};
      }

      /* ── What I Did draft ── */
      .wdid-line {
        font-size: 11px;
        color: ${C.text};
        line-height: 1.5;
      }
      .wdid-spacer { height: 4px; }

      /* ── Already done items ── */
      .already-done-item {
        font-size: 11px;
        color: ${C.success};
        padding: 1px 0;
        line-height: 1.5;
        word-break: break-word;
      }
      .already-done-item--recent {
        color: ${C.warning};
      }
      .repair-date {
        font-size: 10px;
        color: ${C.textDim};
        font-weight: 600;
      }
      .repair-count {
        font-size: 10px;
        font-weight: 700;
        color: ${C.accent};
        background: rgba(57,208,200,0.12);
        border-radius: 3px;
        padding: 0 4px;
        margin-right: 2px;
      }
      .failed-test-item {
        font-size: 11px;
        color: ${C.warning};
        font-weight: 500;
        padding: 2px 0;
        line-height: 1.5;
        word-break: break-word;
      }
      .failed-test-label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: ${C.textDim};
        margin-right: 4px;
      }

      /* ── Correspondence entries ── */
      .corr-entry {
        font-size: 11px;
        color: ${C.text};
        line-height: 1.4;
        padding: 2px 0;
        border-bottom: 1px solid #21262d;
        word-break: break-word;
      }
      .corr-entry:last-child { border-bottom: none; }
      .corr-author {
        font-size: 10px;
        font-weight: 700;
        color: ${C.accent};
      }

      /* ── Scrollbars ── */
      .scout-panel::-webkit-scrollbar { width: 4px; }
      .scout-panel::-webkit-scrollbar-track { background: transparent; }
      .scout-panel::-webkit-scrollbar-thumb { background: ${C.accentDim}; border-radius: 2px; }

    `;
